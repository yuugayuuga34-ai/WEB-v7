<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Webルーレット</title>
<style>
body {
  background: white;
  text-align: center;
  font-family: sans-serif;
}

#wrapper {
  position: relative;
  width: 320px;
  margin: 40px auto;
}

#wheel {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: none;
  position: relative;
}

/* 中央右向き三角 */
#pointer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-top: 15px solid transparent;
  border-bottom: 15px solid transparent;
  border-left: 35px solid red;
  z-index: 10;
}

/* 文字 */
.sliceText {
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: 0 0;
  font-size: 18px;
  font-weight: bold;
  width: 120px;
  text-align: center;
}

/* ボタン */
.startBtn, .resetBtn {
  padding: 10px 20px;
  margin: 5px;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.startBtn { background: #6aa9ff; color: white; }
.resetBtn { background: #ff8a8a; color: white; }

/* 編集UI */
#editorHeader {
  width: 320px;
  margin: 15px auto 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#editorArea {
  margin-bottom: 10px;
}

#modeBtn {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
}

#status {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>
<body>

<h2>Webルーレット</h2>

<div id="wrapper">
  <div id="wheel"></div>
  <div id="pointer"></div>
</div>

<div>
  <button class="startBtn" onclick="spin()">開始</button>
  <button class="resetBtn" onclick="resetWheel()">リセット</button>
</div>

<p id="result"></p>

<div id="editorHeader">
  <button onclick="showEditor()">編集</button>
  <span>タイトル</span>
  <button onclick="hideEditor()">非表示</button>
</div>

<div id="editorArea">
  <textarea id="inputItems" rows="4" cols="30">
あ
い
う
え
  </textarea>
</div>

<button id="modeBtn">モード: ランダム</button>
<p id="status">ランダム</p>

<script>
let items = ["あ","い","う","え"];
let deg = 0;

let mode = "random";
let forcedIndex = 0;

const colors = [
  "#F08080","#F5DEB3","#98FB98","#4169E1",
  "#DDA0DD","#F08080","#F5DEB3","#98FB98",
  "#4169E1","#DDA0DD"
];

// 作成
function createWheel() {
  const wheel = document.getElementById("wheel");
  wheel.innerHTML = "";

  const step = 360 / items.length;
  let gradient = "conic-gradient(";

  for (let i = 0; i < items.length; i++) {
    const start = i * step;
    const end = start + step;
    gradient += `${colors[i % colors.length]} ${start}deg ${end}deg`;
    if (i !== items.length - 1) gradient += ",";

    const text = document.createElement("div");
    text.className = "sliceText";
    text.innerText = items[i];

    const angle = start + step / 2;
    const radius = 90;

    text.style.transform =
      `rotate(${angle}deg) translate(${radius}px) rotate(-${angle}deg) translate(-50%, -50%)`;

    wheel.appendChild(text);
  }

  gradient += ")";
  wheel.style.background = gradient;
}

// 入力リアルタイム
document.getElementById("inputItems").addEventListener("input", () => {
  const input = document.getElementById("inputItems").value;

  items = input.split(/\n|,/).map(s => s.trim()).filter(s => s);

  if (items.length >= 2) {
    forcedIndex = 0;
    createWheel();
    updateStatus();
  }
});

// 編集表示
function showEditor() {
  document.getElementById("editorArea").style.display = "block";
}

function hideEditor() {
  document.getElementById("editorArea").style.display = "none";
}

// モード
document.getElementById("modeBtn").onclick = () => {
  if (mode === "random") {
    mode = "fixed";
    forcedIndex = (forcedIndex + 1) % items.length;
  } else {
    mode = "random";
  }
  updateStatus();
};

function updateStatus() {
  document.getElementById("modeBtn").textContent =
    "モード: " + (mode === "fixed" ? "固定" : "ランダム");

  document.getElementById("status").textContent =
    mode === "fixed"
      ? "固定: " + items[forcedIndex]
      : "ランダム";
}

// 回転（完全一致）
function spin() {
  let targetIndex;

  if (mode === "fixed") {
    targetIndex = forcedIndex;
  } else {
    targetIndex = Math.floor(Math.random() * items.length);
  }

  const step = 360 / items.length;

  // ★右向き三角に完全一致させる角度
  const targetAngle = -(targetIndex * step + step / 2);

  let speed = 30;

  const interval = setInterval(() => {
    speed *= 0.97;
    deg += speed;

    document.getElementById("wheel").style.transform =
      `rotate(${deg}deg)`;

    if (speed < 0.5) {
      clearInterval(interval);

      deg = Math.round(deg) + targetAngle;

      document.getElementById("wheel").style.transform =
        `rotate(${deg}deg)`;

      // ★見た目と完全一致
      document.getElementById("result").textContent =
        "結果: " + items[targetIndex];
    }
  }, 20);
}

// リセット
function resetWheel() {
  deg = 0;
  document.getElementById("wheel").style.transform = "rotate(0deg)";
  document.getElementById("result").textContent = "";
}

// 初期
createWheel();
updateStatus();
</script>

</body>
</html>
