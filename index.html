<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const textarea = document.getElementById("names");

const emptyBox = document.getElementById("emptyBox");
const rouletteArea = document.getElementById("rouletteArea");

const resultBox = document.getElementById("result");

const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");

const secretBtn = document.getElementById("secretBtn");
const secretPanel = document.getElementById("secretPanel");

const fixedMode = document.getElementById("fixedMode");
const fixedSelect = document.getElementById("fixedSelect");

const BASE_COLORS = [
"#76ea7e",
"#f47c6f",
"#4868db",
"#e8d3a7",
"#cb98d8"
];

let items = [];
let colorMap = [];

let rotation = 0;
let spinning = false;

function getItems(){

  return textarea.value
    .split("\n")
    .map(v => v.trim())
    .filter(v => v);

}

function updateFixedList(){

  const current = fixedSelect.value;

  fixedSelect.innerHTML = "";

  getItems().forEach(v => {

    const option = document.createElement("option");

    option.value = v;
    option.textContent = v;

    fixedSelect.appendChild(option);

  });

  if(current){
    fixedSelect.value = current;
  }

}

function buildColorMap(count){

  const arr = [];

  for(let i=0;i<count;i++){
    arr.push(BASE_COLORS[i % BASE_COLORS.length]);
  }

  return arr;

}

function drawWheel(rot = 0){

  items = getItems();

  updateFixedList();

  if(items.length === 0){

    emptyBox.classList.remove("hidden");
    rouletteArea.classList.add("hidden");
    resultBox.style.display = "none";

    return;

  }

  emptyBox.classList.add("hidden");
  rouletteArea.classList.remove("hidden");

  colorMap = buildColorMap(items.length);

  ctx.clearRect(0,0,900,900);

  const cx = 450;
  const cy = 450;

  const radius = 450;

  const arc = Math.PI * 2 / items.length;

  for(let i=0;i<items.length;i++){

    const start = rot + i * arc;
    const end = start + arc;

    ctx.beginPath();

    ctx.moveTo(cx, cy);

    ctx.arc(cx, cy, radius, start, end);

    ctx.closePath();

    ctx.fillStyle = colorMap[i];

    ctx.fill();

    ctx.save();

    ctx.translate(cx, cy);

    ctx.rotate(start + arc / 2);

    ctx.fillStyle = "#000";

    ctx.font = "66px sans-serif";

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(items[i], radius * 0.60, 0);

    ctx.restore();

  }

}

drawWheel(rotation);

textarea.addEventListener("input", ()=>{

  drawWheel(rotation);

});

secretBtn.addEventListener("click", ()=>{

  if(secretPanel.style.display === "block"){
    secretPanel.style.display = "none";
  }else{
    secretPanel.style.display = "block";
  }

});

function easeOutQuint(t){

  return 1 - Math.pow(1 - t, 5);

}

startBtn.addEventListener("click", ()=>{

  if(spinning) return;

  items = getItems();

  if(items.length === 0) return;

  spinning = true;

  const arc = (Math.PI * 2) / items.length;

  let winnerIndex;

  // 固定モード
  if(fixedMode.checked){

    const fixedValue = fixedSelect.value;

    winnerIndex = items.indexOf(fixedValue);

    if(winnerIndex === -1){
      winnerIndex = 0;
    }

  }else{

    winnerIndex = Math.floor(Math.random() * items.length);

  }

  /*
    針は左向き
    = Math.PI
  */

  const pointerAngle = Math.PI;

  /*
    狙う中心角
  */

  const targetAngle =
    winnerIndex * arc + arc / 2;

  /*
    完全一致用
  */

  let finalRotation =
    pointerAngle - targetAngle;

  /*
    必ず前回より回す
  */

  while(finalRotation <= rotation){
    finalRotation += Math.PI * 2;
  }

  /*
    さらに追加回転
  */

  finalRotation += Math.PI * 2 * 8;

  const startRotation = rotation;

  const duration = 7000;

  const startTime = performance.now();

  function animate(now){

    let t =
      (now - startTime) / duration;

    if(t > 1) t = 1;

    const eased =
      easeOutQuint(t);

    rotation =
      startRotation +
      (finalRotation - startRotation) * eased;

    drawWheel(rotation);

    if(t < 1){

      requestAnimationFrame(animate);

    }else{

      rotation = finalRotation;

      drawWheel(rotation);

      /*
        結果判定
      */

      const adjusted =
        (
          pointerAngle - rotation + Math.PI * 2
        ) % (Math.PI * 2);

      let actualIndex =
        Math.floor(adjusted / arc);

      if(actualIndex < 0){
        actualIndex = 0;
      }

      if(actualIndex >= items.length){
        actualIndex = items.length - 1;
      }

      resultBox.style.display = "block";

      resultBox.style.background =
        colorMap[actualIndex];

      resultBox.textContent =
        items[actualIndex];

      spinning = false;

    }

  }

  requestAnimationFrame(animate);

});

resetBtn.addEventListener("click", ()=>{

  rotation = 0;

  resultBox.style.display = "none";

  drawWheel(rotation);

});
</script>
